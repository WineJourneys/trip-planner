name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main        # deploys to live (production)
      - develop     # deploys to 'develop' preview channel
  pull_request:
    branches:
      - main        # deploys a unique PR preview URL

jobs:
  deploy_live:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WINE_JOURNEYS_TRAVEL_PLANNER }}
          projectId: wine-journeys-travel-planner
          channelId: live

  deploy_develop:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WINE_JOURNEYS_TRAVEL_PLANNER }}
          projectId: wine-journeys-travel-planner
          channelId: develop

  deploy_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WINE_JOURNEYS_TRAVEL_PLANNER }}
          projectId: wine-journeys-travel-planner
          # omitting channelId auto-generates a unique preview URL per PR
